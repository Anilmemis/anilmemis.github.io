<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubuntu File Manager - Portfolio</title>
    <style>
        :root {
            --ubuntu-orange: #E95420;
            --ubuntu-cannon-pink: #772953;
            --window-bg: #F2F1F0;
            --sidebar-bg: #D6D6D1;
            --text-color: #333;
        }

        body {
            background: linear-gradient(45deg, #4F194C 0%, #772953 100%);
            font-family: 'Ubuntu', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Ana Pencere */
        .window {
            width: 900px;
            height: 600px;
            background: var(--window-bg);
            border-radius: 8px 8px 0 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Başlık Çubuğu (Title Bar) */
        .title-bar {
            background: linear-gradient(to bottom, #5E5E5E, #43423E);
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #DDD;
            font-size: 13px;
            font-weight: bold;
            position: relative;
        }

        /* Menü Çubuğu */
        .menu-bar {
            background: #EDECEB;
            padding: 5px 15px;
            font-size: 13px;
            border-bottom: 1px solid #BCBCB5;
            color: #333;
        }
        .menu-bar span { margin-right: 15px; cursor: pointer; }

        /* Ana İçerik Alanı */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Yan Panel (Sidebar) */
        .sidebar {
            width: 180px;
            background: var(--sidebar-bg);
            border-right: 1px solid #BCBCB5;
            padding: 15px 0;
        }
        .sidebar-item {
            padding: 5px 20px;
            font-size: 13px;
            color: #333;
            cursor: pointer;
        }
        .sidebar-item:hover { background: #BCBCB5; }
        .sidebar-item.active { background: #C7C7C1; font-weight: bold; }

        /* Dosya Alanı */
        .content {
            flex: 1;
            background: white;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            overflow-y: auto;
            align-content: start;
        }

        /* Klasör Tasarımı */
        .folder {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-color);
            transition: 0.2s;
            padding: 10px;
            border-radius: 4px;
        }
        .folder:hover {
            background-color: #E0E0E0;
            outline: 1px solid #CCC;
        }
        .folder-icon {
            width: 64px;
            height: 64px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="%23F2930D" d="M40 12H22l-4-4H8c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h32c2.2 0 4-1.8 4-4V16c0-2.2-1.8-4-4-4z"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            margin-bottom: 8px;
        }
        .folder-name {
            font-size: 12px;
            text-align: center;
            word-break: break-word;
        }

        /* Alt Durum Çubuğu */
        .status-bar {
            background: var(--window-bg);
            padding: 4px 15px;
            font-size: 11px;
            border-top: 1px solid #BCBCB5;
            color: #666;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">4N1L</div>
    
    <div class="menu-bar">
        <span>File</span> <span>Edit</span> <span>View</span> <span>Go</span> <span>Help</span>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-item active">🏠 4N1L</div>
            <div class="sidebar-item">💽 File System</div>
            <hr style="border:0; border-top:1px solid #BCBCB5;">
            <div class="sidebar-item">🖼️ Pictures</div>
            <div class="sidebar-item">🎵 Music</div>
            <div class="sidebar-item">⬇️ Download</div>
            <div class="sidebar-item">📄 Documents</div>
            <div class="sidebar-item">🚀 Projects</div>
        </div>

        <div class="content">
            <a href="mobil-guvenlik-makaleleri/" class="folder">
                <div class="folder-icon"></div>
                <div class="folder-name">Mobil Uygulama Güvenliği</div>
            </a>

            <a href="#" class="folder">
                <div class="folder-icon"></div>
                <div class="folder-name">Web Penetrasyon</div>
            </a>
            <a href="#" class="folder">
                <div class="folder-icon"></div>
                <div class="folder-name">Sistem Analizi</div>
            </a>
            <a href="#" class="folder">
                <div class="folder-icon"></div>
                <div class="folder-name">Ağ Güvenliği</div>
            </a>
            <a href="#" class="folder">
                <div class="folder-icon"></div>
                <div class="folder-name">Sertifikalar</div>
            </a>
            <a href="#" class="folder">
                <div class="folder-icon"></div>
                <div class="folder-name">Yayınlar</div>
            </a>
        </div>
    </div>

    <div class="status-bar">
        6 items (2.4 GB), Free space: 40.3 GB
    </div>
</div>

</body>
</html>
