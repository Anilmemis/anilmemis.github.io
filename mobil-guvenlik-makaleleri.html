<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobil Uygulama Güvenliği - /home/kim/Documents</title>
    <style>
        :root {
            --ubuntu-orange: #E95420;
            --window-bg: #F2F1F0;
            --sidebar-bg: #D6D6D1;
            --text-color: #333;
        }

        body {
            background: linear-gradient(45deg, #4F194C 0%, #772953 100%);
            font-family: 'Ubuntu', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .window {
            width: 900px;
            height: 600px;
            background: var(--window-bg);
            border-radius: 8px 8px 0 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .title-bar {
            background: linear-gradient(to bottom, #5E5E5E, #43423E);
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #DDD;
            font-size: 13px;
            font-weight: bold;
            position: relative;
        }

        /* Geri Butonu Eklenmiş Adres Çubuğu */
        .address-bar {
            background: #EDECEB;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #BCBCB5;
        }

        .back-btn {
            text-decoration: none;
            color: #333;
            background: #D6D6D1;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 15px;
            border: 1px solid #BCBCB5;
        }

        .path {
            background: white;
            flex: 1;
            padding: 3px 10px;
            border: 1px solid #BCBCB5;
            font-size: 12px;
            border-radius: 3px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 180px;
            background: var(--sidebar-bg);
            border-right: 1px solid #BCBCB5;
            padding: 15px 0;
        }

        .sidebar-item { padding: 5px 20px; font-size: 13px; color: #333; }
        .sidebar-item.active { background: #C7C7C1; font-weight: bold; }

        .content {
            flex: 1;
            background: white;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 25px;
            overflow-y: auto;
            align-content: start;
        }

        /* Makale/Dosya Tasarımı */
        .file {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-color);
            transition: 0.2s;
            padding: 10px;
            border-radius: 4px;
        }
        .file:hover { background-color: #E0E0E0; outline: 1px solid #CCC; }

        .file-icon {
            width: 50px;
            height: 60px;
            background-color: #fdfdfd;
            border: 1px solid #ccc;
            border-top-right-radius: 15px;
            position: relative;
            margin-bottom: 8px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        .file-icon::after {
            content: "";
            position: absolute;
            top: -1px;
            right: -1px;
            width: 15px;
            height: 15px;
            background: #eee;
            border-left: 1px solid #ccc;
            border-bottom: 1px solid #ccc;
            border-top-right-radius: 12px;
        }

        .file-name {
            font-size: 11px;
            text-align: center;
            font-weight: 500;
        }

        .status-bar {
            background: var(--window-bg);
            padding: 4px 15px;
            font-size: 11px;
            border-top: 1px solid #BCBCB5;
            color: #666;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">Mobil Uygulama Güvenliği</div>
    
    <div class="address-bar">
        <a href="index.html" class="back-btn">⬅ Geri</a>
        <div class="path">/home/kim/Documents/Mobil_Uygulama_Guvenligi</div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-item">🏠 kim</div>
            <div class="sidebar-item active">📄 Documents</div>
            <div class="sidebar-item">🚀 Projects</div>
        </div>

        <div class="content">
            <a href="makale-ios.html" class="file">
                <div class="file-icon"></div>
                <div class="file-name">iOS_Sizma_Testi.pdf</div>
            </a>

            <a href="makale-android.html" class="file">
                <div class="file-icon"></div>
                <div class="file-name">Android_Zafiyet_Analizi.docx</div>
            </a>

            <a href="makale-owasp.html" class="file">
                <div class="file-icon"></div>
                <div class="file-name">OWASP_Mobile_Top10.pdf</div>
            </a>

            <a href="makale-api.html" class="file">
                <div class="file-icon"></div>
                <div class="file-name">Mobil_API_Guvenligi.txt</div>
            </a>
        </div>
    </div>

    <div class="status-bar">
        4 items, 12.8 MB
    </div>
</div>

</body>
</html>
