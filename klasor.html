<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title id="page-title">Yükleniyor...</title>
    <style>
        :root { --ubuntu-orange: #E95420; --window-bg: #F2F1F0; }
        body { background: #300A24; font-family: 'Ubuntu', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .window { width: 850px; height: 550px; background: var(--window-bg); border-radius: 8px 8px 0 0; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .title-bar { background: linear-gradient(to bottom, #5E5E5E, #43423E); height: 32px; color: #DDD; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; }
        .address-bar { background: #EDECEB; padding: 10px 15px; border-bottom: 1px solid #BCBCB5; display: flex; align-items: center; }
        .back-btn { text-decoration: none; color: #333; background: #D6D6D1; padding: 2px 12px; border-radius: 4px; font-size: 12px; margin-right: 15px; border: 1px solid #BCBCB5; }
        .path-box { background: white; flex: 1; padding: 4px 10px; border: 1px solid #BCBCB5; font-size: 12px; color: #555; border-radius: 3px; }
        .content { flex: 1; background: white; padding: 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 20px; align-content: start; overflow-y: auto; }
        .file { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #333; transition: 0.2s; padding: 10px; border-radius: 4px; cursor: pointer; }
        .file:hover { background: #E0E0E0; outline: 1px solid #CCC; }
        .file-icon { width: 45px; height: 55px; background: #fff; border: 1px solid #ccc; border-top-right-radius: 12px; position: relative; margin-bottom: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        .file-icon::after { content: ""; position: absolute; top: -1px; right: -1px; width: 12px; height: 12px; background: #eee; border-left: 1px solid #ccc; border-bottom: 1px solid #ccc; border-top-right-radius: 10px; }
        .file-name { font-size: 11px; text-align: center; word-break: break-all; font-weight: 500; }
        #loader { font-size: 12px; padding: 20px; color: #666; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar" id="window-title">Sistem taranıyor...</div>
    <div class="address-bar">
        <a href="index.html" class="back-btn">⬅ Geri</a>
        <div class="path-box" id="current-path">/home/user/Documents/</div>
    </div>
    <div class="content" id="file-list">
        <div id="loader">Dosyalar listeleniyor, lütfen bekleyin...</div>
    </div>
</div>

<script>
    // --- GÜNCELLEMENİZ GEREKEN ALAN ---
    const CONFIG = {
        username: "Anilmemis", 
        repo: "anilmemis.github.io
"
    };
    // ---------------------------------

    const params = new URLSearchParams(window.location.search);
    const folderName = params.get('folder');

    async function getFiles() {
        if (!folderName) return;

        // Başlıkları güncelle
        const cleanName = folderName.replace(/_/g, ' ');
        document.getElementById('page-title').innerText = cleanName;
        document.getElementById('window-title').innerText = cleanName;
        document.getElementById('current-path').innerText += folderName;

        try {
            // GitHub API'den klasör içeriğini çek
            const response = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${folderName}`);
            const data = await response.json();

            const listContainer = document.getElementById('file-list');
            listContainer.innerHTML = ""; // Loader'ı temizle

            data.forEach(item => {
                // Sadece .md dosyalarını listele
                if (item.name.endsWith('.md')) {
                    listContainer.innerHTML += `
                        <a href="makale-goruntule.html?file=${folderName}/${item.name}" class="file">
                            <div class="file-icon"></div>
                            <div class="file-name">${item.name}</div>
                        </a>
                    `;
                }
            });

            if (listContainer.innerHTML === "") {
                listContainer.innerHTML = "<p style='font-size:12px; padding:20px;'>Bu klasörde henüz .md dosyası bulunamadı.</p>";
            }

        } catch (error) {
            console.error("Hata:", error);
            document.getElementById('file-list').innerHTML = "<p style='color:red;'>Hata: GitHub verisi alınamadı.</p>";
        }
    }

    getFiles();
</script>
</body>
</html>
